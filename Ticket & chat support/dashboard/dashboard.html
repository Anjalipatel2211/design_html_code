<!-- =========================
     Modals (Add Task, Staff list)
========================= -->
<div class="modal" id="addTaskModal" hidden role="dialog" aria-modal="true" aria-labelledby="addTaskTitle">
  <div class="modal-card">
    <header class="modal-head">
      <h3 id="addTaskTitle">Add Task</h3>
      <button class="icon-btn" id="addTaskClose" type="button" aria-label="Close">
        <i class="fa fa-xmark"></i>
      </button>
    </header>
    <form class="modal-body" id="addTaskForm" novalidate>
      <label class="field">
        <span>Task title</span>
        <input name="title" required minlength="3" placeholder="e.g. Review patient note" />
      </label>
      <div class="field-row">
        <label class="field">
          <span>Patient</span>
          <input name="patient" required placeholder="Patient name" />
        </label>
        <label class="field">
          <span>Due</span>
          <input name="due" required placeholder="Today, 4:00 PM" />
        </label>
      </div>
      <div class="field-row">
        <label class="field">
          <span>Priority</span>
          <select name="priority" required>
            <option value="">Select…</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </label>
        <label class="field">
          <span>Status</span>
          <select name="status" required>
            <option value="">Select…</option>
            <option>Pending</option>
            <option>In Progress</option>
            <option>In Review</option>
          </select>
        </label>
      </div>
      <label class="field">
        <span>Assigned To <span class="field-optional">(optional)</span></span>
        <select name="assignedStaff">
          <option value="">Select staff…</option>
          <option>Sarah Wilson</option>
          <option>Robert Johnson</option>
          <option>Michael Davis</option>
          <option>Linda Brown</option>
        </select>
      </label>
      <div class="field">
        <span>Attachments <span class="field-optional">(optional)</span></span>
        <div class="dropzone" id="taskDropzone" tabindex="0" role="button" aria-label="Upload attachments">
          <input type="file" id="taskFileInput" name="attachments" multiple hidden accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
          <i class="fa fa-cloud-arrow-up"></i>
          <p class="dropzone-text"><button type="button" class="link-btn" id="taskChooseFileBtn">Choose File</button> or Drag &amp; Drop Files Here</p>
          <span class="dropzone-hint">Supported: PDF, DOC, DOCX, JPG, PNG · Max 20MB per file</span>
        </div>
        <ul class="file-list" id="taskFileList"></ul>
      </div>
      <p class="form-error" id="addTaskError" hidden></p>
      <div class="modal-foot">
        <button type="button" class="btn-secondary" id="addTaskCancel">Cancel</button>
        <button type="submit" class="btn-primary">Save Task</button>
      </div>
    </form>
  </div>
</div>
